<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>VDB Service</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-6">

<h1 class="text-3xl mb-6">Van den Bos Robotics Service</h1>

<div id="customers" class="space-y-4"></div>

<script>
const supabase = window.supabase.createClient(
  "https://tbtoaeraevuygajyaggj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

async function load() {

  const { data: customers } = await supabase
    .from("customers")
    .select("*");

  const { data: machines } = await supabase
    .from("machines")
    .select("*");

  const container = document.getElementById("customers");
  container.innerHTML = "";

  customers.forEach(c => {

    // 🔥 GEEN grouping meer → puur op ID
    const custMachines = machines.filter(m => m.customer_id === c.id);

    const address = `${c.address}, ${c.postcode} ${c.city}, ${c.country}`;

    const el = document.createElement("div");
    el.className = "p-4 bg-slate-800 rounded-xl";

    el.innerHTML = `
      <div class="text-xl font-bold">${c.name}</div>
      <div class="text-sm text-slate-400">${address}</div>

      <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}"
         target="_blank"
         class="inline-block mt-2 px-3 py-1 bg-cyan-400 text-black rounded">
         Maps
      </a>

      <div class="mt-3 text-sm">
        Machines: ${custMachines.length}
      </div>
    `;

    container.appendChild(el);
  });
}

load();
</script>

</body>
</html>
