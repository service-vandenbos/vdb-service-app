<!doctype html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VDB Service</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-slate-950 text-white">

<div class="min-h-screen p-6">
<div class="max-w-6xl mx-auto">

<!-- HEADER -->
<div class="mb-6 rounded-3xl border border-white/10 bg-slate-900 p-6 flex items-center gap-4">
<div class="text-2xl font-bold">
<span class="text-white">Van den Bos</span>
<span class="text-green-500"> Robotics</span>
<span class="text-white"> Service</span>
</div>
</div>

<!-- METRICS -->
<div class="grid md:grid-cols-4 gap-4 mb-6">

<div class="card">Locaties<div id="loc">0</div></div>
<div class="card">Machines<div id="mach">0</div></div>
<div class="card text-red-400">Rood<div id="rood">0</div></div>
<div class="card text-amber-400">Oranje<div id="oranje">0</div></div>

</div>

<div class="grid xl:grid-cols-2 gap-6">

<!-- MAP -->
<div class="card h-[500px] relative" id="map"></div>

<!-- DETAIL -->
<div class="card">

<h2 id="name">Laden...</h2>
<p id="city"></p>

<button id="waze" class="btn mt-4">Open in Waze</button>

<h3 class="mt-6">Machines</h3>
<div id="machines"></div>

</div>

</div>
</div>
</div>

<!-- SERVICE MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
<div class="bg-slate-900 p-6 rounded-2xl w-[400px]">

<h2 id="modal-title"></h2>

<input id="engineer" class="input" value="Hoofdmonteur">
<textarea id="note" class="input"></textarea>

<button id="save" class="btn mt-4">Opslaan</button>

</div>
</div>

<!-- HISTORY MODAL -->
<div id="historyModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
<div class="bg-slate-900 p-6 rounded-2xl w-[500px] max-h-[80vh] overflow-auto">

<h2 class="mb-4">Service historie</h2>
<div id="historyList"></div>

</div>
</div>

<style>
.card{background:#0f172a;padding:20px;border-radius:20px}
.btn{background:#22d3ee;color:black;padding:10px;border-radius:10px}
.input{width:100%;margin-top:10px;background:#1e293b;padding:10px;border-radius:10px}
.marker{position:absolute;transform:translate(-50%,-50%)}
</style>

<script>

const supabase = window.supabase.createClient(
"https://tbtoaeraevuygajyaggj.supabase.co",
"JOUW-KEY"
)

let data = {}
let currentMachine = null

// LOAD DATA
async function load(){

const {data:customers} = await supabase.from("customers").select("*")
const {data:machines} = await supabase.from("machines").select("*")

customers.forEach(c=>{
data[c.id]={...c,machines:[]}
})

machines.forEach(m=>{
if(data[m.customer_id]){
data[m.customer_id].machines.push(m)
}
})

render()

}

// STATUS
function status(date){
if(!date) return "Rood"
let [m,y]=date.split("-")
let d=new Date(y,m-1)
let diff=(new Date()-d)/(1000*60*60*24*30)
if(diff>12)return"Rood"
if(diff>9)return"Oranje"
return"Groen"
}

// RENDER
function render(){

let keys=Object.keys(data)

document.getElementById("loc").innerText=keys.length

let mach=0,rood=0,oranje=0

keys.forEach(k=>{
data[k].machines.forEach(m=>{
mach++
let s=status(m.last_service)
if(s=="Rood")rood++
if(s=="Oranje")oranje++
})
})

document.getElementById("mach").innerText=mach
document.getElementById("rood").innerText=rood
document.getElementById("oranje").innerText=oranje

let map=document.getElementById("map")
map.innerHTML=""

keys.forEach(k=>{
let c=data[k]

let el=document.createElement("div")
el.className="marker"

el.style.left=(c.longitude+10)*5+"%"
el.style.top=(90-c.latitude)*1.2+"%"

el.innerHTML=`<div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-black text-xs">VDB</div>`

el.onclick=()=>select(k)

map.appendChild(el)
})

}

// SELECT
function select(id){

let c=data[id]

document.getElementById("name").innerText=c.name
document.getElementById("city").innerText=c.city

// WAZE FIX
document.getElementById("waze").onclick=()=>{
window.open(`https://waze.com/ul?from=52.356,6.662&to=${c.latitude},${c.longitude}&navigate=yes`)
}

let list=document.getElementById("machines")
list.innerHTML=""

c.machines.forEach(m=>{

let s=status(m.last_service)

let el=document.createElement("div")
el.className="card mt-3"

el.innerHTML=`
<b>${m.machine_name}</b> (${s})<br>
${m.last_service||"---"}<br><br>

<button onclick="service('${m.id}','${m.machine_name}')" class="btn">Service</button>
<button onclick="history('${m.id}')" class="btn">Historie</button>
`

list.appendChild(el)

})

}

// SERVICE
function service(id,name){
currentMachine=id
document.getElementById("modal").classList.remove("hidden")
document.getElementById("modal-title").innerText=name
}

// SAVE
document.getElementById("save").onclick=async()=>{

let now=new Date()
let val=`${String(now.getMonth()+1).padStart(2,"0")}-${now.getFullYear()}`

await supabase.from("machines").update({last_service:val}).eq("id",currentMachine)

await supabase.from("service_events").insert({
machine_id:currentMachine,
service_month:val,
engineer_name:document.getElementById("engineer").value,
note:document.getElementById("note").value
})

document.getElementById("modal").classList.add("hidden")
load()

}

// HISTORY
async function history(id){

let {data:hist}=await supabase
.from("service_events")
.select("*")
.eq("machine_id",id)
.order("created_at",{ascending:false})

let box=document.getElementById("historyList")
box.innerHTML=""

hist.forEach(h=>{
box.innerHTML+=`
<div class="card mb-2">
<b>${h.service_month}</b><br>
${h.engineer_name}<br>
${h.note}
</div>
`
})

document.getElementById("historyModal").classList.remove("hidden")

}

// INIT
load()

</script>

</body>
</html>
