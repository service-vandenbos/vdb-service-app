<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VDB Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-white">
    <div class="min-h-screen p-6">
      <div class="mx-auto max-w-6xl">
        <div class="mb-6 rounded-3xl border border-white/10 bg-slate-900 p-6">
          <div class="text-xs uppercase tracking-[0.35em] text-cyan-300">VDB Service</div>
          <h1 class="mt-2 text-3xl font-semibold">Van den Bos Service</h1>
          <p class="mt-2 text-slate-300">Robot Service App</p>
        </div>

        <div class="mb-6 grid gap-4 md:grid-cols-4">
          <div class="rounded-3xl border border-white/10 bg-slate-900 p-5">
            <div class="text-sm text-slate-300">Locaties</div>
            <div id="metric-locaties" class="mt-2 text-3xl font-semibold">0</div>
          </div>
          <div class="rounded-3xl border border-white/10 bg-slate-900 p-5">
            <div class="text-sm text-slate-300">Machines</div>
            <div id="metric-machines" class="mt-2 text-3xl font-semibold">0</div>
          </div>
          <div class="rounded-3xl border border-white/10 bg-slate-900 p-5">
            <div class="text-sm text-slate-300">Rood</div>
            <div id="metric-rood" class="mt-2 text-3xl font-semibold text-red-400">0</div>
          </div>
          <div class="rounded-3xl border border-white/10 bg-slate-900 p-5">
            <div class="text-sm text-slate-300">Oranje</div>
            <div id="metric-oranje" class="mt-2 text-3xl font-semibold text-amber-400">0</div>
          </div>
        </div>

        <div class="grid gap-6 xl:grid-cols-[1.3fr_0.9fr]">
          <section class="rounded-3xl border border-white/10 bg-slate-900 p-5">
            <div class="mb-4 flex items-center justify-between">
              <div>
                <h2 class="text-xl font-semibold">Europa kaart</h2>
                <p class="text-sm text-slate-300">Klik op een klant</p>
              </div>
              <input
                id="search"
                placeholder="Zoek klant"
                class="rounded-2xl border border-white/10 bg-slate-800 px-4 py-2 text-sm"
              />
            </div>

            <div class="relative h-[500px] overflow-hidden rounded-[30px] border border-white/10 bg-[linear-gradient(180deg,_#0f172a_0%,_#111827_100%)]">
              <div class="absolute inset-0 opacity-30">
                <div class="absolute left-[12%] top-[18%] h-[42%] w-[26%] rounded-[48%] border border-cyan-200/15"></div>
                <div class="absolute left-[28%] top-[34%] h-[18%] w-[12%] rounded-[44%] border border-cyan-200/15"></div>
                <div class="absolute left-[42%] top-[25%] h-[33%] w-[21%] rounded-[44%] border border-cyan-200/15"></div>
              </div>

              <button data-key="smurfit" class="marker ...">
  <div class="flex h-8 w-8 items-center justify-center rounded-full bg-black text-[10px] font-bold text-green-400 shadow-lg">
    VDB
  </div>
</button>
              <button data-key="bentheim" class="marker ...">
  <div class="flex h-8 w-8 items-center justify-center rounded-full bg-black text-[10px] font-bold text-green-400 shadow-lg">
    VDB
  </div>
</button>
             <button data-key="drei" class="marker ...">
  <div class="flex h-8 w-8 items-center justify-center rounded-full bg-black text-[10px] font-bold text-green-400 shadow-lg">
    VDB
  </div>
</button>
              <button data-key="boxline" class="marker ...">
  <div class="flex h-8 w-8 items-center justify-center rounded-full bg-black text-[10px] font-bold text-green-400 shadow-lg">
    VDB
  </div>
</button>
              <button data-key="smart" class="marker ...">
  <div class="flex h-8 w-8 items-center justify-center rounded-full bg-black text-[10px] font-bold text-green-400 shadow-lg">
    VDB
  </div>
</button>
              <button data-key="fulda" class="marker ...">
  <div class="flex h-8 w-8 items-center justify-center rounded-full bg-black text-[10px] font-bold text-green-400 shadow-lg">
    VDB
  </div>
</button>
            </div>
          </section>

          <aside class="rounded-3xl border border-white/10 bg-slate-900 p-5">
            <div class="text-xs uppercase tracking-[0.3em] text-cyan-300">Klantdetail</div>
            <h2 id="detail-name" class="mt-2 text-2xl font-semibold"></h2>
            <p id="detail-city" class="mt-1 text-sm text-slate-300"></p>

            <div class="mt-5 grid gap-3 sm:grid-cols-2">
              <div class="rounded-2xl border border-white/10 bg-slate-800/80 p-4">
                <div class="text-xs uppercase tracking-[0.2em] text-slate-400">Status</div>
                <div id="detail-status" class="mt-2 text-base font-medium"></div>
              </div>
              <div class="rounded-2xl border border-white/10 bg-slate-800/80 p-4">
                <div class="text-xs uppercase tracking-[0.2em] text-slate-400">Machines</div>
                <div id="detail-count" class="mt-2 text-base font-medium"></div>
              </div>
            </div>

            <div class="mt-5 flex flex-wrap gap-2">
              <a
                id="waze-link"
                href="#"
                target="_blank"
                rel="noreferrer"
                class="rounded-2xl bg-cyan-400 px-4 py-2 text-sm font-semibold text-slate-950"
              >Open in Waze</a>
            </div>

            <div class="mt-6">
              <h3 class="mb-3 text-lg font-semibold">Robotics</h3>
              <div id="robotics-list" class="space-y-3"></div>
            </div>

            <div class="mt-6">
              <h3 class="mb-3 text-lg font-semibold">CM</h3>
              <div id="cm-list" class="space-y-3"></div>
            </div>
          </aside>
        </div>
      </div>
    </div>

    <div id="service-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 p-4">
      <div class="w-full max-w-lg rounded-3xl border border-white/10 bg-slate-900 p-6">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-xs uppercase tracking-[0.3em] text-cyan-300">Service</div>
            <h3 id="modal-title" class="mt-2 text-2xl font-semibold">Service registreren</h3>
          </div>
          <button id="close-modal-top" class="rounded-xl border border-white/10 px-3 py-2 text-sm">Sluiten</button>
        </div>

        <div class="mt-5 grid gap-4">
          <label class="block">
            <div class="mb-2 text-sm text-slate-300">Monteur</div>
            <input id="engineer" class="w-full rounded-2xl border border-white/10 bg-slate-800 px-4 py-3 text-sm" value="Hoofdmonteur" />
          </label>

          <label class="block">
            <div class="mb-2 text-sm text-slate-300">Notitie</div>
            <textarea id="service-note" rows="4" class="w-full rounded-2xl border border-white/10 bg-slate-800 px-4 py-3 text-sm" placeholder="Bijvoorbeeld: klant wilde alleen onderhoud aan robot 1"></textarea>
          </label>
        </div>

        <div class="mt-5 flex flex-wrap justify-end gap-2">
          <button id="close-modal-bottom" class="rounded-2xl border border-white/10 px-4 py-2 text-sm">Annuleren</button>
          <button id="save-service" class="rounded-2xl bg-cyan-400 px-4 py-2 text-sm font-semibold text-slate-950">Opslaan</button>
        </div>
      </div>
    </div>

    <script>
      const customers = {
        smurfit: {
          name: "Smurfit Westrock Grootbijgaarden",
          city: "Grootbijgaarden",
          lat: "50.871",
          lng: "4.256",
          robotics: [
            { name: "ROBOT 1", status: "Rood", lastService: "---" },
            { name: "ROBOT 2", status: "Rood", lastService: "---" }
          ],
          cm: []
        },
        bentheim: {
          name: "Model Bentheim",
          city: "Bad Bentheim",
          lat: "52.3168",
          lng: "7.1667",
          robotics: [
            { name: "ROBOT 1", status: "Rood", lastService: "---" },
            { name: "ROBOT 2", status: "Rood", lastService: "---" }
          ],
          cm: []
        },
        drei: {
          name: "Drei V",
          city: "München",
          lat: "48.1565",
          lng: "11.7583",
          robotics: [
            { name: "ROBOT 1", status: "Oranje", lastService: "05-2025" },
            { name: "ROBOT 2", status: "Oranje", lastService: "05-2025" },
            { name: "ROBOT 3", status: "Oranje", lastService: "05-2025" }
          ],
          cm: [
            { name: "Afduwer", status: "Groen", lastService: "06-2025" }
          ]
        },
        boxline: {
          name: "Boxline",
          city: "Merksplas",
          lat: "51.3635",
          lng: "4.8433",
          robotics: [
            { name: "ROBOT 1", status: "Oranje", lastService: "06-2025" },
            { name: "ROBOT 2", status: "Groen", lastService: "11-2025" }
          ],
          cm: [
            { name: "Machine 1", status: "Rood", lastService: "---" }
          ]
        },
        smart: {
          name: "Smart Packaging",
          city: "Oosterhout",
          lat: "51.6347",
          lng: "4.9012",
          robotics: [
            { name: "ROBOT 1", status: "Oranje", lastService: "06-2025" }
          ],
          cm: []
        },
        fulda: {
          name: "DS Smith Packaging Fulda",
          city: "Fulda",
          lat: "50.5401",
          lng: "9.6974",
          robotics: [
            { name: "ROBOT 1", status: "Rood", lastService: "12-2023" }
          ],
          cm: [
            { name: "Afduwer", status: "Rood", lastService: "01-2025" }
          ]
        }
      };

      const markers = document.querySelectorAll(".marker");
      const detailName = document.getElementById("detail-name");
      const detailCity = document.getElementById("detail-city");
      const detailStatus = document.getElementById("detail-status");
      const detailCount = document.getElementById("detail-count");
      const roboticsList = document.getElementById("robotics-list");
      const cmList = document.getElementById("cm-list");
      const search = document.getElementById("search");
      const wazeLink = document.getElementById("waze-link");

      const metricLocaties = document.getElementById("metric-locaties");
      const metricMachines = document.getElementById("metric-machines");
      const metricRood = document.getElementById("metric-rood");
      const metricOranje = document.getElementById("metric-oranje");

      const modal = document.getElementById("service-modal");
      const closeModalTop = document.getElementById("close-modal-top");
      const closeModalBottom = document.getElementById("close-modal-bottom");
      const saveService = document.getElementById("save-service");
      const modalTitle = document.getElementById("modal-title");

      let currentCustomerKey = "smurfit";
      let currentMachineName = "";
      let currentMachineType = "";

      function getCustomerStatus(customer) {
        const all = [...customer.robotics, ...customer.cm];
        if (all.some((m) => m.status === "Rood")) return "Rood";
        if (all.some((m) => m.status === "Oranje")) return "Oranje";
        return "Groen";
      }

      function updateMetrics() {
        const keys = Object.keys(customers);
        let machines = 0;
        let rood = 0;
        let oranje = 0;

        keys.forEach((key) => {
          const c = customers[key];
          const all = [...c.robotics, ...c.cm];
          machines += all.length;
          all.forEach((m) => {
            if (m.status === "Rood") rood++;
            if (m.status === "Oranje") oranje++;
          });
        });

        metricLocaties.textContent = keys.length;
        metricMachines.textContent = machines;
        metricRood.textContent = rood;
        metricOranje.textContent = oranje;
      }

      function markerColorClass(status) {
        if (status === "Rood") return "bg-red-500";
        if (status === "Oranje") return "bg-amber-500";
        return "bg-emerald-500";
      }

      function statusPill(status) {
        const cls = status === "Rood"
          ? "bg-red-500/20 text-red-100"
          : status === "Oranje"
            ? "bg-amber-500/20 text-amber-100"
            : "bg-emerald-500/20 text-emerald-100";

        return `<span class="rounded-full px-3 py-1 text-xs font-semibold ${cls}">${status}</span>`;
      }

      function machineCard(machine, type) {
        return `
          <div class="rounded-2xl border border-white/10 bg-slate-800/80 p-4">
            <div class="flex items-start justify-between gap-4">
              <div>
                <div class="font-medium">${machine.name}</div>
                <div class="mt-1 text-sm text-slate-300">Laatste service: ${machine.lastService}</div>
              </div>
              ${statusPill(machine.status)}
            </div>
            <div class="mt-4">
              <button
                class="service-machine rounded-xl border border-white/10 px-3 py-2 text-sm"
                data-machine="${machine.name}"
                data-type="${type}"
              >Service</button>
            </div>
          </div>
        `;
      }

      function renderMarkers() {
        markers.forEach((marker) => {
          const key = marker.dataset.key;
          const customer = customers[key];
          const status = getCustomerStatus(customer);

          marker.classList.remove("bg-red-500", "bg-amber-500", "bg-emerald-500");
          marker.classList.add(markerColorClass(status));
          marker.dataset.name = customer.name;
          marker.dataset.city = customer.city;
          marker.dataset.status = status;
        });
      }

      function bindMachineButtons() {
        document.querySelectorAll(".service-machine").forEach((btn) => {
          btn.addEventListener("click", () => {
            currentMachineName = btn.dataset.machine;
            currentMachineType = btn.dataset.type;
            modalTitle.textContent = `Service registreren - ${btn.dataset.machine}`;
            openModal();
          });
        });
      }

      function renderCustomer(key) {
        const c = customers[key];
        currentCustomerKey = key;

        detailName.textContent = c.name;
        detailCity.textContent = c.city;
        detailStatus.textContent = getCustomerStatus(c);
        detailCount.textContent = c.robotics.length + c.cm.length;
        wazeLink.href = `https://waze.com/ul?ll=${c.lat},${c.lng}&navigate=yes`;

        roboticsList.innerHTML = c.robotics.length
          ? c.robotics.map((m) => machineCard(m, "Robotics")).join("")
          : `<div class="rounded-2xl border border-dashed border-white/10 bg-slate-800/40 p-4 text-sm text-slate-300">Geen robotics machines</div>`;

        cmList.innerHTML = c.cm.length
          ? c.cm.map((m) => machineCard(m, "CM")).join("")
          : `<div class="rounded-2xl border border-dashed border-white/10 bg-slate-800/40 p-4 text-sm text-slate-300">Geen CM machines</div>`;

        bindMachineButtons();
        renderMarkers();
        updateMetrics();
      }

      function openModal() {
        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      function closeModal() {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }

      function saveCurrentMachine() {
        const c = customers[currentCustomerKey];
        const list = currentMachineType === "CM" ? c.cm : c.robotics;

        const idx = list.findIndex((m) => m.name === currentMachineName);
        if (idx !== -1) {
          list[idx].lastService = "03-2026";
          list[idx].status = "Groen";
        }

        renderCustomer(currentCustomerKey);
        closeModal();
      }

      markers.forEach((marker) => {
        marker.addEventListener("click", () => {
          renderCustomer(marker.dataset.key);
        });
      });

      search.addEventListener("input", () => {
        const q = search.value.toLowerCase();
        markers.forEach((marker) => {
          const c = customers[marker.dataset.key];
          const txt = `${c.name} ${c.city}`.toLowerCase();
          marker.style.display = txt.includes(q) ? "flex" : "none";
        });
      });

      closeModalTop.addEventListener("click", closeModal);
      closeModalBottom.addEventListener("click", closeModal);
      saveService.addEventListener("click", saveCurrentMachine);

      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });

      renderCustomer("smurfit");
    </script>
  </body>
</html>
