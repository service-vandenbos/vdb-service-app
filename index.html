<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VDB Service</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white p-6">

  <h1 class="text-3xl font-bold mb-6">
    Van den Bos Robotics <span class="text-cyan-400">Service</span>
  </h1>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div id="map" class="h-[500px] bg-slate-900 rounded-2xl relative overflow-hidden"></div>

    <div class="bg-slate-900 p-5 rounded-2xl">
      <h2 id="name" class="text-2xl font-semibold">Selecteer klant</h2>
      <p id="address" class="text-slate-300 mt-2"></p>

      <a id="maps" target="_blank" class="bg-cyan-400 text-black px-3 py-2 rounded mt-3 inline-block">
        Maps
      </a>

      <div id="machines" class="mt-4 space-y-3"></div>
    </div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://tbtoaeraevuygajyaggj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRidG9hZXJhZXZ1eWdhanlhZ2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDUyNzksImV4cCI6MjA5MDA4MTI3OX0.D8gKf3hIwQnP8GULWgN2pINrttdR_oUc_WSK50SQl9c"
    );

    let customers = {};
    let currentMachine = null;

    async function load() {
      const { data: cust, error: custError } = await supabase.from("customers").select("*");
      const { data: mach, error: machError } = await supabase.from("machines").select("*");

      if (custError || machError) {
        alert("Fout bij laden van data");
        console.error(custError || machError);
        return;
      }

      customers = {};

      cust.forEach(c => {
        customers[c.id] = { ...c, machines: [] };
      });

      mach.forEach(m => {
        if (customers[m.customer_id]) {
          customers[m.customer_id].machines.push(m);
        }
      });

      renderMap();
    }

    function renderMap() {
      const map = document.getElementById("map");
      map.innerHTML = "";

      Object.values(customers).forEach(c => {
        const el = document.createElement("button");
        el.style.position = "absolute";
        el.style.left = ((Number(c.longitude) + 10) / 35 * 100) + "%";
        el.style.top = (100 - ((Number(c.latitude) - 35) / 25 * 100)) + "%";
        el.style.transform = "translate(-50%, -50%)";

        el.innerHTML = `
          <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-xs text-black font-bold shadow">
            VDB
          </div>
        `;

        el.onclick = () => selectCustomer(c.id);
        map.appendChild(el);
      });
    }

    function selectCustomer(id) {
      const c = customers[id];
      if (!c) return;

      const addr = [c.address, `${c.postcode || ""} ${c.city || ""}`.trim(), c.country]
        .filter(Boolean)
        .join(", ");

      document.getElementById("name").innerText = c.name || "Onbekend";
      document.getElementById("address").innerText = addr;

      document.getElementById("maps").href =
        "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(addr);

      const list = document.getElementById("machines");
      list.innerHTML = "";

      c.machines.forEach(m => {
        const el = document.createElement("div");
        el.className = "bg-slate-800 p-3 rounded";

        el.innerHTML = `
          <div class="font-semibold">${m.machine_name || "Machine"}</div>
          <div class="text-sm text-slate-300 mt-1">Laatste service: ${m.last_service || "---"}</div>
          <button class="mt-3 border border-white/20 px-3 py-1 rounded" onclick="openService('${m.id}')">
            Service
          </button>
        `;

        list.appendChild(el);
      });
    }

    function openService(id) {
      currentMachine = id;

      const name = prompt("Monteur", "Hoofdmonteur");
      if (!name) return;

      saveService(name);
    }

    async function saveService(name) {
      const now = new Date();
      const val = String(now.getMonth() + 1).padStart(2, "0") + "-" + now.getFullYear();

      const { error: err1 } = await supabase
        .from("machines")
        .update({ last_service: val })
        .eq("id", currentMachine);

      if (err1) {
        alert("Opslaan machine mislukt");
        console.error(err1);
        return;
      }

      const { error: err2 } = await supabase
        .from("service_events")
        .insert({
          machine_id: currentMachine,
          service_month: val,
          engineer_name: name
        });

      if (err2) {
        alert("Opslaan service historie mislukt");
        console.error(err2);
        return;
      }

      load();
    }

    load();
  </script>
</body>
</html>
